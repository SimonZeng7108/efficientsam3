model:
  stage1_ckpt: "sam3_checkpoints/sam3.pt"
  hybrid_dim: 256
  num_global_latents: 64
  num_spatial_latents: 192
  window_size: 8
data:
  features_dir: "output/stage2_features"
  teacher_dir: "output/stage2_teacher"
  seq_len: 24
  max_frames: -1
train:
  epochs: 12
  batch_size: 1
  workers: 4
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  cosine_weight: 0.5
output:
  dir: "output/stage2"
