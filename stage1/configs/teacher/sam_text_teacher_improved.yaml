# Teacher embedding generation config for improved text encoder training
# Uses context_length=16 based on research findings:
# - 0.04% token loss at L=16 (vs L=32)
# - 4x attention speedup
# - Positions 8-31 are redundant (similarity 0.76-0.79)

MODEL:
  NAME: SAM3-Text-Teacher-Improved
  BACKBONE: sam3_text_encoder
  RESUME: sam3_checkpoints/sam3.pt

TRAIN:
  EPOCHS: 1

DATA:
  DATASET: text_annotations
  DATA_PATH: data/text_annotations_combined_with_recap.json
  BATCH_SIZE: 64
  NUM_WORKERS: 8

DISTILL:
  EMBED_DIM: 256
  NUM_EMBED: 16  # Reduced from 32 to match context_length=16
  SAVE_TEACHER_EMBED: True
  TEACHER_EMBED_PATH: output/stage1_text_teacher/embeddings_improved/
  CONTEXT_LENGTH: 16  # KEY: Reduced context length
