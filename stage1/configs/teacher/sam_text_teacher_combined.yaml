# Teacher embedding generation config for combined text annotations
# Run this first to generate teacher embeddings before student training

MODEL:
  NAME: SAM3-Text-Teacher-Combined
  BACKBONE: sam3_text_encoder
  RESUME: sam3_checkpoints/sam3.pt

TRAIN:
  EPOCHS: 1

DATA:
  DATASET: text_annotations
  DATA_PATH: data/text_annotations_combined_5_dataset.json
  BATCH_SIZE: 64
  NUM_WORKERS: 8

DISTILL:
  EMBED_DIM: 256
  NUM_EMBED: 32
  CONTEXT_LENGTH: 32
  SAVE_TEACHER_EMBED: True
  TEACHER_EMBED_PATH: output/stage1_text_teacher/embeddings_combined/
